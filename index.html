<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<script>
function toRoman(num) {
    const romans = [
        ["M",1000],["CM",900],["D",500],["CD",400],
        ["C",100],["XC",90],["L",50],["XL",40],
        ["X",10],["IX",9],["V",5],["IV",4],["I",1]
    ];
    let result = "";
    for (let [letter, value] of romans) {
        while (num >= value) {
            result += letter;
            num -= value;
        }
    }
    return result;
}

setInterval(() => {
    let el = document.getElementById("busuanzi_value_site_pv");
    if (el && el.innerText && !isNaN(el.innerText)) {
        el.innerText = toRoman(parseInt(el.innerText));
    }
}, 1000);
</script>
